{% extends "dashboard/base.html" %}

{% block title %}Perfil | Peluqueria Estilo{% endblock %}
{% block page_title %}Mi Perfil{% endblock %}

{% block dashboard_content %}
<div class="max-w-2xl rounded-2xl border border-line bg-white p-6 shadow-sm">
    <h2 class="text-lg font-semibold text-ink">Datos de usuario</h2>
    <p class="mt-1 text-sm text-ink/70">Actualiza tu informacion personal.</p>

    <form method="post" class="mt-5 space-y-4">
        {% csrf_token %}
        <div>
            <label class="mb-1 block text-xs font-semibold uppercase tracking-[0.14em] text-brand">Nombre</label>
            <input type="text" name="first_name" value="{{ user.first_name }}"
                class="w-full rounded-xl border border-line bg-panel px-3 py-2 text-sm focus:border-brand focus:outline-none" />
        </div>
        <div>
            <label class="mb-1 block text-xs font-semibold uppercase tracking-[0.14em] text-brand">Apellido</label>
            <input type="text" name="last_name" value="{{ user.last_name }}"
                class="w-full rounded-xl border border-line bg-panel px-3 py-2 text-sm focus:border-brand focus:outline-none" />
        </div>
        <div>
            <label class="mb-1 block text-xs font-semibold uppercase tracking-[0.14em] text-brand">Correo</label>
            <input type="email" value="{{ user.email }}" disabled
                class="w-full rounded-xl border border-line bg-[#f1eeea] px-3 py-2 text-sm" />
        </div>
        <div>
            <label class="mb-1 block text-xs font-semibold uppercase tracking-[0.14em] text-brand">Rol</label>
            <input type="text" value="{{ user.get_role_display }}" disabled
                class="w-full rounded-xl border border-line bg-[#f1eeea] px-3 py-2 text-sm" />
        </div>
        <button type="submit"
            class="rounded-xl bg-ink px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-brand">Guardar
            cambios</button>
    </form>
</div>
{% endblock %}
